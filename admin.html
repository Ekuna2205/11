<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body class="admin-body">
  <div class="bg-blur blur-1"></div>
  <div class="bg-blur blur-2"></div>

  <div class="admin-login-wrap" id="loginWrapper">
    <div class="admin-login-card glass">
      <span class="section-tag">Admin Access</span>
      <h1>Нэвтрэх</h1>

      <form id="loginForm" class="stack-form">
        <input type="text" id="username" placeholder="Username" required />
        <input type="password" id="password" placeholder="Password" required />
        <button type="submit" class="primary-btn full-btn">Нэвтрэх</button>
      </form>

      <p class="hint-text"></p>
      <p id="loginError" class="error-text"></p>
      <a href="index.html" class="back-link">← Нүүр хуудас руу буцах</a>
    </div>
  </div>

  <div class="admin-panel hidden" id="adminPanel">
    <header class="admin-header">
      <div class="container admin-header-inner">
        <div>
          <span class="section-tag">ADMIN</span>
          <h1>Админ удирдлага</h1>
        </div>

        <div class="admin-actions">
          <a href="index.html" class="secondary-btn">Сайтыг харах</a>
          <button id="logoutBtn" class="danger-btn">Гарах</button>
        </div>
      </div>
    </header>

    <main class="container admin-grid">
      <section class="admin-card glass">
        <h2>Цэс удирдах</h2>
        <form id="menuForm" class="stack-form">
          <input type="text" id="menuName" placeholder="Цэсний нэр" required />
          <input type="text" id="menuLink" placeholder="#about эсвэл #projects" required />
          <button type="submit" class="primary-btn full-btn">Нэмэх</button>
        </form>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Нэр</th>
                <th>Холбоос</th>
                <th>Үйлдэл</th>
              </tr>
            </thead>
            <tbody id="menuTableBody"></tbody>
          </table>
        </div>
      </section>

      <section class="admin-card glass">
        <h2>Ур чадвар удирдах</h2>
        <form id="skillForm" class="stack-form">
          <input type="text" id="skillName" placeholder="Жишээ: React" required />
          <button type="submit" class="primary-btn full-btn">Нэмэх</button>
        </form>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Ур чадвар</th>
                <th>Үйлдэл</th>
              </tr>
            </thead>
            <tbody id="skillTableBody"></tbody>
          </table>
        </div>
      </section>

      <section class="admin-card glass">
        <h2>Төсөл удирдах</h2>
        <form id="projectForm" class="stack-form">
          <input type="text" id="projectTitle" placeholder="Төслийн нэр" required />
          <textarea id="projectDesc" placeholder="Төслийн тайлбар" required></textarea>
          <button type="submit" class="primary-btn full-btn">Нэмэх</button>
        </form>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Нэр</th>
                <th>Тайлбар</th>
                <th>Үйлдэл</th>
              </tr>
            </thead>
            <tbody id="projectTableBody"></tbody>
          </table>
        </div>
      </section>

      <section class="admin-card glass">
        <h2>Нүүр хэсэг өөрчлөх</h2>
        <form id="heroForm" class="stack-form">
          <input type="text" id="heroTitleInput" placeholder="Гарчиг" required />
          <textarea id="heroTextInput" placeholder="Тайлбар текст" required></textarea>
          <button type="submit" class="primary-btn full-btn">Хадгалах</button>
        </form>
      </section>
    </main>
  </div>

  <script src="assets/script.js"></script>
</body>
</html>
